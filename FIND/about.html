<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于我 - shiorko的小站</title>
    <style>
        /* --- 全局基础设置 (与首页保持一致) --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            line-height: 1.6;
        }
        a { text-decoration: none; color: inherit; transition: all 0.3s ease; }
        
        /* --- 主容器 --- */
        .container {
            max-width: 1000px;
            margin: 30px auto;
            background: #ffffff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-wrap: wrap;
        }

        /* --- 左侧侧边栏 --- */
        .sidebar {
            flex: 0 0 260px;
            background: #2c3e50;
            color: #fff;
            padding: 30px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 横幅图片 */
        .banner-img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        .banner-img:hover {
            transform: scale(1.03);
        }

        /* 导航菜单 */
        .nav-menu {
            list-style: none;
            width: 100%;
        }
        .nav-menu li {
            margin-bottom: 12px;
        }
        .nav-menu a {
            display: block;
            background: #34495e;
            color: #ecf0f1;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            border-left: 4px solid transparent;
        }
        .nav-menu a:hover {
            background: #ffa400;
            color: #fff;
            border-left: 4px solid #fff;
            transform: translateX(5px);
        }
        /* 特殊样式：当前页面或不可点击项 */
        .nav-item-static {
            display: block;
            background: #cecece; /* 对应你原来的浅灰色 */
            color: #fff;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: default;
            border-left: 4px solid #fff;
        }

        /* --- 右侧主内容区 --- */
        .main-content {
            flex: 1;
            padding: 50px 40px;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center; /* 内容垂直居中 */
        }

        /* 内容文本样式 */
        .content-text {
            font-size: 18px;
            color: #555;
            margin-bottom: 20px;
            line-height: 1.8;
        }
        .emoji-large {
            font-size: 48px;
            display: block;
            margin: 20px 0;
            animation: bounce 2s infinite;
        }
        .kaomoji {
            font-size: 32px;
            color: #ffa400;
            font-weight: bold;
            display: block;
            margin-top: 20px;
        }

        /* 简单的弹跳动画 */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* --- 页脚 --- */
        .site-footer {
            width: 100%;
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #999;
        }
        .footer-logo {
            height: 20px;
            vertical-align: middle;
            margin-right: 5px;
            opacity: 0.6;
        }

        /* --- 手机端适配 --- */
        @media (max-width: 768px) {
            .container {
                margin: 0;
                border-radius: 0;
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                flex: none;
                padding: 20px;
            }
            .banner-img {
                max-width: 300px;
                margin: 0 auto 20px;
            }
            .main-content {
                padding: 30px 20px;
                justify-content: flex-start;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <!-- 左侧侧边栏 -->
    <aside class="sidebar">
        <!-- 注意：这里使用了 ../ 因为文件在子文件夹中 -->
        <img src="../use/channels4_banner (4).jpg" alt="Gawr Gura Banner" class="banner-img">
        
        <ul class="nav-menu">
            <!-- "关于我"设为静态高亮，表示当前页面 -->
            <li><span class="nav-item-static">关于我</span></li>
            
            <li><a href="call m.html">联系我</a></li>
            <li><a href="away.html">我的踪迹</a></li>
            <li><a href="URL.html">有用的网址？</a></li>
            <li><a href="../index.html">回到首页</a></li>
        </ul>
    </aside>

    <!-- 右侧主内容 -->
    <main class="main-content">
        <div class="content-text">
            <p>当然这个网页是瞎写的 🤔</p>
            
            <span class="emoji-large">😊</span>
            
            <p>（我很神秘🤫）</p>
            
            <span class="kaomoji">（￣︶￣）↗</span>
        </div>
    </main>

    <!-- 底部版权 -->
    <footer class="site-footer">
        <img src="../use/屏幕截图 2025-12-25 181752.png" alt="Logo" class="footer-logo">
        <p>Copyright © 2025-2026 shiorko.</p>
    </footer>
</div>

</body>
</html>
