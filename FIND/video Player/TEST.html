<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的播放器 - shiorko的小站</title>
    <style>
        /* --- 全局设置 --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        a { text-decoration: none; color: inherit; transition: 0.3s; }

        /* --- 主容器 --- */
        .container {
            max-width: 1100px;
            margin: 20px auto;
            width: 95%;
            flex: 1;
        }

        /* --- 顶部横幅 --- */
        .header-banner {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            background: #fff;
        }
        .banner-img {
            width: 100%;
            height: auto;
            display: block;
            max-height: 300px;
            object-fit: cover;
        }

        /* --- 播放器区域 --- */
        .player-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        /* 视频/iframe 容器 (16:9 比例) */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 */
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .video-wrapper iframe, 
        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- 选集网格 --- */
        .episode-title {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
            border-left: 5px solid #A0EA43;
            padding-left: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .current-play-badge {
            font-size: 12px;
            background: #A0EA43;
            color: #2c3e50;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: normal;
        }

        .grid-menu {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }

        .grid-item {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 50px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
            padding: 0 10px;
            transition: all 0.2s;
        }

        /* 样式分类 */
        .item-active {
            background: #A0EA43; /* 亮绿 - 当前播放 */
            color: #2c3e50;
            cursor: default;
            box-shadow: 0 2px 8px rgba(160, 234, 67, 0.4);
        }
        
        .item-link {
            background: #6D6D6D; /* 深灰 - 普通链接 */
            color: #fff;
        }
        .item-link:hover {
            background: #555;
            transform: translateY(-2px);
            color: #A0EA43;
        }

        .item-special {
            background: #ff9f43; /* 橙色 - 特殊专区 */
            color: #fff;
        }
        .item-special:hover {
            background: #ffbe76;
            transform: translateY(-2px);
        }

        .item-empty {
            background: #e9ecef;
            color: #adb5bd;
            cursor: default;
        }

        /* --- 页脚 --- */
        .site-footer {
            text-align: center;
            padding: 30px 20px;
            color: #999;
            font-size: 12px;
            margin-top: auto;
        }
        .footer-logo {
            height: 18px;
            vertical-align: middle;
            margin-right: 5px;
            opacity: 0.6;
        }

        /* 手机适配 */
        @media (max-width: 768px) {
            .grid-menu { grid-template-columns: repeat(2, 1fr); }
            .container { width: 100%; margin: 0; }
            .header-banner, .player-card { border-radius: 0; }
        }
    </style>
</head>

<body>

<div class="container">
    <!-- 顶部横幅 -->
    <header class="header-banner">
        <img src="../../use/channels4_banner (4).jpg" alt="Banner" class="banner-img">
    </header>

    <main class="player-card">
        <!-- 播放器核心区域 -->
        <div class="video-wrapper">
            <!-- 
               关键修改：使用 iframe 嵌入解析地址
               因为 jx.ouo.chat 是网页解析器，不能用 <video> 标签
               autoplay=1 尝试让解析器自动播放
            -->
            <iframe 
                src="https://jx.vipmv.co/?url=BV1PA54zTECo&p=1&autoplay=1" 
                allowfullscreen 
                allow="autoplay; encrypted-media" 
                scrolling="no">
            </iframe>
        </div>

        <!-- 选集列表 -->
        <div class="episode-title">
            📺 正在播放：你的名字 中字
            <span class="current-play-badge">EP 01</span>
        </div>

        <div class="grid-menu">
            <!-- 当前播放 (高亮，不可点) -->
            <div class="grid-item item-active">你的名字 中字</div>

            <!-- 其他剧集 (可点击跳转) -->
            <!-- 注意：这里假设其他页面也是类似的 iframe 结构 -->
            <a href="dont onj.html" class="grid-item item-link">别当欧内酱了</a>
            <a href="GBC.html" class="grid-item item-link">广 东 少 女 乐 队</a>
            <a href="SHFLX.html" class="grid-item item-link">守护天津西</a>
            
            <!-- 空位填充 -->
            <div class="grid-item item-empty">暂无资源</div>
            <div class="grid-item item-empty">暂无资源</div>
            <div class="grid-item item-empty">暂无资源</div>
            <div class="grid-item item-empty">暂无资源</div>
            <div class="grid-item item-empty">暂无资源</div>

            <!-- 特殊专区 -->
            <a href="FFF/GCZQ.html" class="grid-item item-special">🔥 大奋专区</a>
        </div>
    </main>
</div>

<!-- 页脚 -->
<footer class="site-footer">
    <img src="../../use/屏幕截图 2025-12-25 181752.png" alt="Logo" class="footer-logo">
    <p>Copyright © 2025-2026 shiorko.</p>
    <p>⚠️ 仅限个人学习交流使用</p>
</footer>

</body>
</html>
