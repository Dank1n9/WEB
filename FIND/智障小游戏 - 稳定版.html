<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智障小游戏 - 稳定版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ff69b4;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .game-container {
            text-align: center;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.4);
            max-width: 90%;
            width: 600px;
            position: relative;
            z-index: 10;
        }
        
        h1 {
            color: #ff00ff;
            font-size: 2.8em;
            text-shadow: 4px 4px 0 #00ffff;
            margin: 10px 0;
        }
        
        .score-container {
            font-size: 1.8em;
            color: #000;
            margin: 15px 0;
            font-weight: bold;
        }
        
        .button {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 18px 35px;
            font-size: 1.8em;
            border-radius: 60px;
            cursor: pointer;
            margin: 15px;
            font-weight: bold;
            box-shadow: 0 8px 0 #cc0000;
            transition: all 0.1s;
            position: absolute;
            display: inline-block;
        }
        
        .button:hover {
            background-color: #ff3333;
            transform: scale(1.05);
        }
        
        .button:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #cc0000;
        }
        
        .button2 {
            background-color: #00ff00;
            box-shadow: 0 8px 0 #00cc00;
        }
        
        .button2:hover {
            background-color: #33ff33;
        }
        
        .button3 {
            background-color: #0000ff;
            box-shadow: 0 8px 0 #0000cc;
        }
        
        .button3:hover {
            background-color: #3333ff;
        }
        
        .message {
            font-size: 2em;
            color: #ff00ff;
            margin: 20px 0;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .counter {
            font-size: 1.4em;
            color: #000;
            margin: 15px 0;
        }
        
        .moving-button {
            position: absolute;
            background-color: #ffff00;
            color: #000;
            border: none;
            padding: 12px 25px;
            font-size: 1.4em;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 0 #cccc00;
            z-index: 1000;
        }
        
        .instructions {
            background-color: #fff;
            border: 3px dashed #ff00ff;
            padding: 15px;
            margin: 20px 0;
            border-radius: 15px;
            color: #000;
            font-size: 1.2em;
        }
        
        .badges {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        
        .badge {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 8px;
            font-weight: bold;
            color: white;
            border: 4px solid #000;
            font-size: 1.5em;
        }
        
        .badge1 { background-color: #ff0000; }
        .badge2 { background-color: #00ff00; }
        .badge3 { background-color: #0000ff; }
        
        .level-indicator {
            font-size: 1.3em;
            color: #ff8c00;
            margin: 10px 0;
            font-weight: bold;
        }
        
        .progress-bar {
            width: 100%;
            height: 20px;
            background-color: #ddd;
            border-radius: 10px;
            margin: 15px 0;
            overflow: hidden;
        }
        
        .progress {
            height: 100%;
            background-color: #ff00ff;
            width: 0%;
            transition: width 0.5s;
        }
        
        .footer {
            margin-top: 20px;
            color: white;
            font-size: 1.2em;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🧠 智障小游戏 🧠</h1>
        
        <div class="instructions">
            <p>游戏规则：疯狂点击红色按钮得分！按钮会随机移动，还有各种智障干扰！</p>
        </div>
        
        <div class="score-container">
          <p>得分: <span id="score">0</span> | 等级: <span id="level">1</span></p>
          <audio controls="controls" autoplay="autoplay" >
            <source src="https://file.shiorko.dpdns.org/file/【哈基米音乐】Memory Reboot.mp3" type="audio/mp3">
          </audio>
        </div>
        
        <div class="level-indicator" id="levelIndicator">当前等级: 入门智障</div>
        
        <div class="progress-bar">
            <div class="progress" id="progressBar"></div>
        </div>
        
        <div class="message" id="message">点击红色按钮开始智障之旅！</div>
        
        <div class="badges">
            <div class="badge badge1">1</div>
            <div class="badge badge2">2</div>
            <div class="badge badge3">3</div>
        </div>
        
        <div style="position: relative; height: 100px; width: 100%; margin: 20px 0;">
            <button class="button" id="mainButton">点击我！</button>
        </div>
        
        <div class="counter">
            <p>总点击数: <span id="clickCount">0</span> | 连击数: <span id="combo">0</span></p>
        </div>
        
        <div>
            <button class="button button2" id="bonusButton">奖励按钮</button>
            <button class="button button3" id="decoyButton">别点我</button>
        </div>
    </div>
    
    <div class="footer">
        智障小游戏 v3.0 - 专治各种不服
    </div>

    <script>
        // 游戏变量
        let score = 0;
        let clickCount = 0;
        let combo = 0;
        let level = 1;
        let gameActive = false;
        let buttonMoveInterval;
        let crazyMode = false;
        let lastClickTime = 0;
        let comboTimeout;
        
        // 获取DOM元素
        const mainButton = document.getElementById('mainButton');
        const bonusButton = document.getElementById('bonusButton');
        const decoyButton = document.getElementById('decoyButton');
        const scoreDisplay = document.getElementById('score');
        const clickCountDisplay = document.getElementById('clickCount');
        const comboDisplay = document.getElementById('combo');
        const levelDisplay = document.getElementById('level');
        const levelIndicator = document.getElementById('levelIndicator');
        const messageDisplay = document.getElementById('message');
        const progressBar = document.getElementById('progressBar');
        
        // 主按钮点击事件
        mainButton.addEventListener('click', function(e) {
            if (!gameActive) {
                gameActive = true;
                messageDisplay.textContent = "游戏开始！按钮开始移动了！快点击！";
                startButtonMovement();
            }
            
            // 计算连击
            const now = Date.now();
            if (now - lastClickTime < 1000) {
                combo++;
            } else {
                combo = 1;
            }
            lastClickTime = now;
            
            // 清除之前的连击计时器
            clearTimeout(comboTimeout);
            comboTimeout = setTimeout(() => {
                combo = 0;
                updateDisplays();
            }, 1000);
            
            // 计算得分
            let points = 1;
            if (combo > 1) {
                points = combo; // 连击得分递增
            }
            score += points;
            
            clickCount += 1;
            updateDisplays();
            
            // 随机改变按钮颜色
            const colors = ['#ff0000', '#ff3300', '#ff6600', '#ff9900', '#ffcc00', '#ffff00'];
            mainButton.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            // 随机移动按钮
            moveButtonRandomly();
            
            // 随机触发智障事件
            triggerRandomEvent();
            
            // 添加点击反馈
            this.textContent = `点击我！(${points}分)`;
            setTimeout(() => {
                this.textContent = '点击我！';
            }, 300);
        });
        
        // 奖励按钮点击事件
        bonusButton.addEventListener('click', function() {
            if (Math.random() > 0.7) { // 30% 概率触发大奖励
                score += 5;
                messageDisplay.textContent = "🎉 超级奖励！+5分！";
            } else if (Math.random() > 0.5) { // 20% 概率扣分
                score = Math.max(0, score - 3);
                messageDisplay.textContent = "💥 奖励是假的！-3分！";
            } else { // 50% 概率小奖励
                score += 2;
                messageDisplay.textContent = "🎁 小奖励！+2分！";
            }
            clickCount += 1;
            updateDisplays();
            setTimeout(() => {
                if (messageDisplay.textContent.includes("奖励")) {
                    messageDisplay.textContent = "点击红色按钮得分！";
                }
            }, 2000);
        });
        
        // 诱饵按钮点击事件
        decoyButton.addEventListener('click', function() {
            if (Math.random() > 0.5) { // 50% 概率扣分
                score = Math.max(0, score - 2);
                messageDisplay.textContent = "😡 说了别点还点！-2分！";
            } else if (Math.random() > 0.3) { // 20% 概率得分
                score += 1;
                messageDisplay.textContent = "🤔 偷偷点一下居然得分了！";
            } else { // 30% 概率随机事件
                score += Math.floor(Math.random() * 5);
                messageDisplay.textContent = "🤪 你点了个寂寞！随机得分！";
            }
            clickCount += 1;
            updateDisplays();
            setTimeout(() => {
                messageDisplay.textContent = "点击红色按钮得分！";
            }, 2000);
        });
        
        // 开始按钮移动
        function startButtonMovement() {
            buttonMoveInterval = setInterval(() => {
                moveButtonRandomly();
                
                // 随机触发疯狂模式
                if (Math.random() > 0.95 && !crazyMode) {
                    activateCrazyMode();
                }
            }, 2000);
        }
        
        // 随机移动按钮
        function moveButtonRandomly() {
            const container = document.querySelector('.game-container');
            const containerRect = container.getBoundingClientRect();
            
            // 获取按钮尺寸
            const buttonRect = mainButton.getBoundingClientRect();
            
            // 计算最大可移动范围（考虑按钮本身尺寸）
            const maxX = containerRect.width - buttonRect.width - 40;
            const maxY = 60; // 限制在指定区域内
            
            // 生成随机位置
            const newX = Math.floor(Math.random() * maxX);
            const newY = Math.floor(Math.random() * maxY) + 20; // 留出顶部空间
            
            // 应用新位置
            mainButton.style.left = newX + 'px';
            mainButton.style.top = newY + 'px';
        }
        
        // 触发随机事件
        function triggerRandomEvent() {
            const events = [
                () => {
                    if (Math.random() > 0.8) {
                        document.body.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
                        setTimeout(() => {
                            document.body.style.backgroundColor = '#ff69b4';
                        }, 500);
                    }
                },
                () => {
                    if (Math.random() > 0.9) {
                        const titles = ["你是个智障！", "继续点击！", "停不下来！", "智障之王"];
                        document.title = titles[Math.floor(Math.random() * titles.length)];
                        setTimeout(() => {
                            document.title = "智障小游戏 - 稳定版";
                        }, 1000);
                    }
                },
                () => {
                    if (Math.random() > 0.85) {
                        const size = 20 + Math.random() * 30;
                        mainButton.style.fontSize = size + 'px';
                        setTimeout(() => {
                            mainButton.style.fontSize = '1.8em';
                        }, 500);
                    }
                },
                () => {
                    if (Math.random() > 0.9) {
                        messageDisplay.textContent = "你点得真快！继续！";
                        setTimeout(() => {
                            messageDisplay.textContent = "点击红色按钮得分！";
                        }, 1500);
                    }
                }
            ];
            
            events.forEach(event => event());
        }
        
        // 激活疯狂模式
        function activateCrazyMode() {
            crazyMode = true;
            messageDisplay.textContent = "🌀 疯狂模式启动！按钮移动加速！";
            
            clearInterval(buttonMoveInterval);
            buttonMoveInterval = setInterval(() => {
                moveButtonRandomly();
                
                // 疯狂模式下随机改变背景
                if (Math.random() > 0.7) {
                    document.body.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
                }
                
                // 疯狂模式下可能添加移动按钮
                if (Math.random() > 0.8 && document.querySelectorAll('.moving-button').length < 3) {
                    createMovingButton();
                }
            }, 500); // 更快的移动速度
            
            setTimeout(() => {
                crazyMode = false;
                clearInterval(buttonMoveInterval);
                startButtonMovement();
                messageDisplay.textContent = "疯狂模式结束！按钮恢复正常速度！";
                document.body.style.backgroundColor = '#ff69b4';
            }, 10000); // 10秒后结束疯狂模式
        }
        
        // 创建移动按钮
        function createMovingButton() {
            const movingBtn = document.createElement('button');
            movingBtn.className = 'moving-button';
            movingBtn.textContent = '额外得分';
            movingBtn.style.left = Math.random() * (window.innerWidth - 120) + 'px';
            movingBtn.style.top = Math.random() * (window.innerHeight - 60) + 'px';
            
            movingBtn.addEventListener('click', function() {
                score += 3;
                messageDisplay.textContent = "🎯 额外得分！+3分！";
                document.body.removeChild(movingBtn);
                updateDisplays();
                setTimeout(() => {
                    messageDisplay.textContent = "点击红色按钮得分！";
                }, 1500);
            });
            
            document.body.appendChild(movingBtn);
            
            // 让按钮移动
            const moveInterval = setInterval(() => {
                if (document.body.contains(movingBtn)) {
                    const newX = parseInt(movingBtn.style.left) + (Math.random() * 40 - 20);
                    const newY = parseInt(movingBtn.style.top) + (Math.random() * 40 - 20);
                    
                    // 确保按钮在屏幕内
                    const boundedX = Math.max(0, Math.min(window.innerWidth - 120, newX));
                    const boundedY = Math.max(0, Math.min(window.innerHeight - 60, newY));
                    
                    movingBtn.style.left = boundedX + 'px';
                    movingBtn.style.top = boundedY + 'px';
                } else {
                    clearInterval(moveInterval);
                }
            }, 300);
            
            // 10秒后移除按钮
            setTimeout(() => {
                if (document.body.contains(movingBtn)) {
                    document.body.removeChild(movingBtn);
                }
            }, 10000);
        }
        
        // 更新显示
        function updateDisplays() {
            scoreDisplay.textContent = score;
            clickCountDisplay.textContent = clickCount;
            comboDisplay.textContent = combo;
            
            // 更新等级
            const newLevel = Math.floor(score / 10) + 1;
            if (newLevel !== level) {
                level = newLevel;
                levelDisplay.textContent = level;
                
                // 更新等级描述
                const levelDescriptions = [
                    "入门智障", "初级智障", "中级智障", "高级智障", 
                    "专家智障", "大师智障", "宗师智障", "传说智障", "神话智障", "智障之王"
                ];
                const levelDesc = levelDescriptions[Math.min(level - 1, levelDescriptions.length - 1)] || `超神智障 Lv.${level}`;
                levelIndicator.textContent = `当前等级: ${levelDesc}`;
            }
            
            // 更新进度条
            const progressPercent = (score % 10) * 10;
            progressBar.style.width = progressPercent + '%';
            
            // 根据分数改变消息
            if (score >= 50) {
                messageDisplay.textContent = "你已经是智障之王了！继续挑战！";
            } else if (score >= 30) {
                messageDisplay.textContent = "智障高手！继续点击！";
            } else if (score >= 20) {
                messageDisplay.textContent = "你真是个智障天才！分数爆表！";
            } else if (score >= 10) {
                messageDisplay.textContent = "不错嘛！继续点击！";
            } else if (score >= 5) {
                messageDisplay.textContent = "已经上手了！继续加油！";
            }
        }
        
        // 页面加载完成后初始化
        window.onload = function() {
            // 设置主按钮初始位置
            moveButtonRandomly();
        };
    </script>
</body>
</html>
