    <style>
        /* --- 全局基础设置 --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
            background-color: #f0f2f5;

        }
        a { text-decoration: none; color: inherit; transition: all 0.3s ease; }
        
        /* --- 主容器 --- */
        .container {
            max-width: 1000px;
            margin: 30px auto;
            background: #ffffff;

            border-radius: 12px;

            display: flex;

            background: #2c3e50;
            color: #fff;
            padding: 30px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .banner-img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        .banner-img:hover { transform: scale(1.03); }
        .nav-menu { list-style: none; width: 100%; }
        .nav-menu li { margin-bottom: 12px; }
        .nav-menu a {
            display: block;
            background: #34495e;
            color: #ecf0f1;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            border-left: 4px solid transparent;
        }
        .nav-menu a:hover {
            background: #ffa400;
            color: #fff;
            border-left: 4px solid #fff;
            transform: translateX(5px);
        }
        .nav-item-active {
            background: #cecece !important;
            color: #fff !important;
            border-left: 4px solid #fff !important;
            cursor: default;
        }

        /* --- 右侧主内容区 --- */
        .main-content {
            flex: 1;
            padding: 30px;
            min-width: 300px;
        }
        .page-title {
            font-size: 24px;
            margin-bottom: 20px;
            color: #2c3e50;
            border-bottom: 2px solid #ffa400;
            display: inline-block;
            padding-bottom: 5px;
        }

        /* --- 网址网格布局 (严格对应原表格顺序) --- */
        .url-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 强制固定为5列，对应原表格 */
            gap: 15px;
        }

        .url-card {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 60px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            text-align: center;
            padding: 0 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            color: #fff;
        }
        .url-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            filter: brightness(1.1);
        }

        /* 颜色主题 (严格对应原背景色) */
        .theme-red { background: linear-gradient(135deg, #a61818, #c0392b); }
        .theme-blue { background: linear-gradient(135deg, #3956ff, #2980b9); }
        
        /* 特殊样式：占位符 --- */
        .placeholder {
            background: #eee;
            color: #aaa;
            font-size: 20px;
            letter-spacing: 5px;
            cursor: default;
            box-shadow: none;
            border: 1px dashed #ccc;
        }
        .placeholder:hover { transform: none; }

        /* 特殊样式：高亮边框 (如播放器) */
        .highlight-border {
            border: 2px solid #ffa400;
            position: relative;
        }
        .highlight-border::after {
            content: "★";
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ffa400;
            color: #fff;
            font-size: 12px;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            line-height: 16px;
            text-align: center;
        }

        /* --- 页脚 --- */
        .site-footer {
            width: 100%;
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #999;
        }
        .footer-logo {
            height: 20px;
            vertical-align: middle;
            margin-right: 5px;
            opacity: 0.6;
        }

        /* --- 手机端适配 --- */
        @media (max-width: 768px) {
            .container { margin: 0; border-radius: 0; flex-direction: column; }
            .sidebar { width: 100%; flex: none; padding: 20px; }
            .banner-img { max-width: 300px; margin: 0 auto 20px; }
            .url-grid { 
                grid-template-columns: repeat(2, 1fr); /* 手机变2列 */
                gap: 10px;
            }
            .main-content { padding: 20px; }
        }
        @media (max-width: 480px) {
            .url-grid { grid-template-columns: 1fr; } /* 超小屏幕1列 */
        }
    </style>
</head>
