<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我 - shiorko的小站</title>
    <style>
        /* --- 全局基础设置 --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            line-height: 1.6;
        }
        a { text-decoration: none; color: inherit; transition: all 0.3s ease; }
        
        /* --- 主容器 --- */
        .container {
            max-width: 1000px;
            margin: 30px auto;
            background: #ffffff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-wrap: wrap;
        }

        /* --- 左侧侧边栏 --- */
        .sidebar {
            flex: 0 0 260px;
            background: #2c3e50;
            color: #fff;
            padding: 30px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .banner-img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        .banner-img:hover { transform: scale(1.03); }
        .nav-menu { list-style: none; width: 100%; }
        .nav-menu li { margin-bottom: 12px; }
        .nav-menu a {
            display: block;
            background: #34495e;
            color: #ecf0f1;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            border-left: 4px solid transparent;
        }
        .nav-menu a:hover {
            background: #ffa400;
            color: #fff;
            border-left: 4px solid #fff;
            transform: translateX(5px);
        }
        .nav-item-active {
            background: #cecece !important;
            color: #fff !important;
            border-left: 4px solid #fff !important;
            cursor: default;
        }

        /* --- 右侧主内容区 --- */
        .main-content {
            flex: 1;
            padding: 40px;
            min-width: 300px;
        }
        .page-title {
            font-size: 24px;
            margin-bottom: 30px;
            color: #2c3e50;
            border-bottom: 2px solid #ffa400;
            display: inline-block;
            padding-bottom: 5px;
        }

        /* --- 联系信息列表 --- */
        .contact-list {
            list-style: none;
            max-width: 600px;
        }
        .contact-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8f9fa;
            margin-bottom: 15px;
            padding: 15px 20px;
            border-radius: 8px;
            border-left: 5px solid #bdc3c7;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .contact-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            background: #fff;
        }
        .contact-label {
            font-weight: bold;
            color: #555;
            font-size: 16px;
            flex-shrink: 0;
            width: 140px;
        }
        .contact-value {
            font-size: 16px;
            color: #333; /* 默认正常颜色 */
            word-break: break-all;
            text-align: right;
            flex: 1;
            padding-left: 20px;
        }
        
        /* 特殊样式：高亮链接 (你的域名) */
        .highlight-link {
            display: inline-block;
            background: #68f4ba;
            color: #006442;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(104, 244, 186, 0.4);
            transition: all 0.3s ease;
        }
        .highlight-link:hover {
            background: #4cd9a9;
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(104, 244, 186, 0.6);
            color: #004d33;
        }

        /* 特殊样式：仅用于“已隐藏”或“不知道”等次要信息 */
        .text-muted {
            color: #95a5a6;
            font-style: italic;
        }

        /* --- 页脚 --- */
        .site-footer {
            width: 100%;
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #999;
        }
        .footer-logo {
            height: 20px;
            vertical-align: middle;
            margin-right: 5px;
            opacity: 0.6;
        }

        /* --- 手机端适配 --- */
        @media (max-width: 768px) {
            .container { margin: 0; border-radius: 0; flex-direction: column; }
            .sidebar { width: 100%; flex: none; padding: 20px; }
            .banner-img { max-width: 300px; margin: 0 auto 20px; }
            .main-content { padding: 20px; }
            .contact-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .contact-label {
                width: 100%;
                margin-bottom: 5px;
                font-size: 14px;
                color: #7f8c8d;
            }
            .contact-value {
                text-align: left;
                padding-left: 0;
                font-size: 15px;
            }
        }
    </style>
</head>

<div class="container">
    <!-- 左侧侧边栏 -->

        <ul class="nav-menu">

    <!-- 右侧主内容 -->
    <main class="main-content">

            </li>

            <!-- 直接发邮件/主域名 (高亮) -->
            <li class="contact-item" style="border-left-color: #68f4ba; background: #f0fdf6;">

                <span class="contact-value">
                    <a href="http://ep01.shiorko.dpdns.org" class="highlight-link">ep01.shiorko.dpdns.org</a>

            </li>
        </ul>

        <p style="margin-top: 30px; color: #7f8c8d; font-size: 14px;">
            💡 提示：如果你需要紧急联系，请直接访问上方的绿色链接域名。
        </p>
    </main>

    <!-- 底部版权 -->
    <footer class="site-footer">
        <img src="../use/屏幕截图 2025-12-25 181752.png" alt="Logo" class="footer-logo">
        <p>Copyright © 2025-2026 shiorko. 版权没有，欢迎复制。</p>
    </footer>
</div>

</body>
</html>
