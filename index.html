<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <!-- 这一行很重要，让网页在手机上正常显示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shiorko的小站</title>
    <style>
        /* --- 全局基础设置 --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
            background-color: #f0f2f5; /* 浅灰背景，保护视力 */
            color: #333;
            line-height: 1.6;
        }
        a { text-decoration: none; color: inherit; transition: all 0.3s ease; }
        
        /* --- 主容器：居中显示，最大宽度1000px --- */
        .container {
            max-width: 1000px;
            margin: 30px auto;
            background: #ffffff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); /* 柔和阴影 */
            border-radius: 12px; /* 圆角 */
            overflow: hidden;
            display: flex; /* 弹性布局 */
            flex-wrap: wrap; /* 允许换行（适配手机） */
        }

        /* --- 左侧侧边栏 --- */
        .sidebar {
            flex: 0 0 260px; /* 固定宽度260px */
            background: #2c3e50; /* 深色背景 */
            color: #fff;
            padding: 30px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 横幅图片样式 */
        .banner-img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        .banner-img:hover {
            transform: scale(1.03); /* 鼠标悬停轻微放大 */
        }

        /* 导航菜单 */
        .nav-menu {
            list-style: none;
            width: 100%;
        }
        .nav-menu li {
            margin-bottom: 12px;
        }
        .nav-menu a {
            display: block;
            background: #34495e;
            color: #ecf0f1;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            border-left: 4px solid transparent;
        }
        .nav-menu a:hover {
            background: #ffa400; /* 悬停变橙色 */
            color: #fff;
            border-left: 4px solid #fff;
            transform: translateX(5px); /* 向右移动 */
        }

        /* --- 右侧主内容区 --- */
        .main-content {
            flex: 1; /* 占据剩余空间 */
            padding: 40px;
            min-width: 300px; /* 防止太窄 */
        }

        /* 音乐提示条 */
        .music-bar {
            background: linear-gradient(135deg, #ffa400, #ff8c00);
            color: #fff;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(255, 164, 0, 0.3);
            flex-wrap: wrap;
            gap: 10px;
        }
        .music-bar span { font-weight: bold; font-size: 15px; }
        .music-bar a {
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
        }
        .music-bar a:hover { background: #fff; color: #ffa400; }

        /* 视频容器 */
        .video-container {
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            position: relative;
            padding-top: 56.25%; /* 16:9 比例 */
            height: 0;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 提示信息框 */
        .alert-box {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
            padding: 15px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
        }
        .alert-box::before {
            content: "⚠️";
            margin-right: 10px;
            font-size: 18px;
        }

        /* 底部版本信息 */
        .version-info {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #777;
            font-size: 14px;
        }
        .version-info a { color: #ffa400; font-weight: bold; }

        /* --- 页脚 --- */
        .site-footer {
            width: 100%;
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #999;
        }
        .footer-logo {
            height: 20px;
            vertical-align: middle;
            margin-right: 5px;
            opacity: 0.6;
        }

        /* --- 手机端适配 (屏幕宽度小于768px时) --- */
        @media (max-width: 768px) {
            .container {
                margin: 0;
                border-radius: 0;
                flex-direction: column; /* 改为垂直排列 */
            }
            .sidebar {
                width: 100%;
                flex: none;
                padding: 20px;
            }
            .banner-img {
                max-width: 300px; /* 手机上限制图片最大宽度 */
                margin: 0 auto 20px;
            }
            .main-content {
                padding: 20px;
            }
            .music-bar {
                flex-direction: column;
                text-align: center;
            }
            .video-container {
                padding-top: 75%; /* 手机上稍微高一点 */
            }
        }
    </style>
</head>

<body>

<div class="container">

        <!-- 版本与更新 -->
        <div class="version-info">

    <!-- 底部版权 -->
    <footer class="site-footer">
        <img src="use/屏幕截图 2025-12-25 181752.png" alt="Logo" class="footer-logo">
        <p>Copyright © 2025-2026 shiorko.</p>
    </footer>
</div>

</body>
</html>
